<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WakeUp Catalyst - 覚醒スイッチ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes flash {
            0%, 100% { background-color: #f8fafc; }
            50% { background-color: #fee2e2; }
        }
        .flash-active {
            animation: flash 0.2s infinite;
        }
        .bg-gradient-mesh {
            background-color: #f8fafc;
            background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                              radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                              radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

    <div id="main-container" class="max-w-md mx-auto p-6 space-y-8">
        <!-- Header -->
        <header class="text-center pt-8">
            <h1 class="text-4xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600">
                WAKE UP!
            </h1>
            <p class="text-slate-400 mt-2 text-sm">脳を強制再起動するワークスペース</p>
        </header>

        <!-- Emergency Alert -->
        <section class="bg-slate-800 rounded-3xl p-6 border border-slate-700 shadow-xl">
            <h2 class="text-lg font-bold mb-4 flex items-center">
                <span class="mr-2">🚨</span> 緊急アラート
            </h2>
            <button id="alert-btn" class="w-full py-4 bg-red-600 hover:bg-red-500 active:scale-95 transition-all rounded-2xl font-black text-xl shadow-lg shadow-red-900/20">
                爆音で目を覚ます
            </button>
            <p class="text-[10px] text-slate-500 mt-2 text-center text-red-400">※音量にご注意ください</p>
        </section>

        <!-- Stroop Test (Game) -->
        <section id="game-section" class="bg-slate-800 rounded-3xl p-6 border border-slate-700 shadow-xl">
            <h2 class="text-lg font-bold mb-4 flex items-center">
                <span class="mr-2">🧠</span> 脳負荷テスト (ストループ)
            </h2>
            <div id="game-area" class="text-center py-6 bg-slate-900 rounded-2xl mb-4 min-h-[120px] flex items-center justify-center">
                <p id="target-word" class="text-4xl font-black transition-all"></p>
            </div>
            <div class="grid grid-cols-2 gap-3" id="choice-buttons">
                <!-- Buttons will be injected here -->
            </div>
            <div id="score-display" class="mt-4 text-center text-sm font-mono text-cyan-400">
                連続正解: <span id="combo-count">0</span>
            </div>
        </section>

        <!-- Mental Math -->
        <section class="bg-slate-800 rounded-3xl p-6 border border-slate-700 shadow-xl">
            <h2 class="text-lg font-bold mb-4 flex items-center">
                <span class="mr-2">🔢</span> 高速計算
            </h2>
            <div id="math-question" class="text-2xl font-mono text-center mb-4 text-white">
                Loading...
            </div>
            <div class="flex gap-2">
                <input type="number" id="math-input" class="flex-1 bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-xl focus:outline-none focus:ring-2 focus:ring-cyan-500" placeholder="?">
                <button id="math-submit" class="bg-cyan-600 px-6 rounded-xl font-bold">答</button>
            </div>
        </section>

        <!-- Tips -->
        <section class="bg-slate-800/50 rounded-3xl p-6 border border-dashed border-slate-700">
            <h2 class="text-sm font-bold text-slate-400 mb-3 uppercase tracking-widest">リフレッシュのヒント</h2>
            <p id="tip-text" class="text-sm leading-relaxed text-slate-300 italic">
                「冷たい水で手を洗う」と、交感神経が刺激されて目が覚めます。
            </p>
        </section>

        <footer class="text-center pb-8 text-slate-600 text-[10px]">
            &copy; 2024 WakeUp Catalyst | Focus Mode Active
        </footer>
    </div>

    <script>
        // Audio Setup
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep(freq = 440, duration = 0.5) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            osc.type = 'square'; // 刺激的な矩形波
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // --- Emergency Alert ---
        const alertBtn = document.getElementById('alert-btn');
        alertBtn.addEventListener('click', () => {
            playBeep(880, 0.1);
            setTimeout(() => playBeep(1200, 0.1), 100);
            setTimeout(() => playBeep(880, 0.1), 200);
            
            document.body.classList.add('flash-active');
            setTimeout(() => document.body.classList.remove('flash-active'), 1000);
        });

        // --- Stroop Test ---
        const colors = [
            { name: '赤', value: '#ef4444' },
            { name: '青', value: '#3b82f6' },
            { name: '緑', value: '#22c55e' },
            { name: '黄', value: '#eab308' },
            { name: '紫', value: '#a855f7' }
        ];
        let combo = 0;
        let currentTargetColor = null;

        function setupGame() {
            const wordIdx = Math.floor(Math.random() * colors.length);
            const colorIdx = Math.floor(Math.random() * colors.length);
            const targetWord = document.getElementById('target-word');
            
            targetWord.innerText = colors[wordIdx].name;
            targetWord.style.color = colors[colorIdx].value;
            currentTargetColor = colors[colorIdx].value;

            const btnContainer = document.getElementById('choice-buttons');
            btnContainer.innerHTML = '';
            
            // Shuffle colors for buttons
            const shuffled = [...colors].sort(() => Math.random() - 0.5);
            shuffled.forEach(c => {
                const btn = document.createElement('button');
                btn.className = 'py-3 bg-slate-700 hover:bg-slate-600 rounded-xl font-bold transition-colors';
                btn.innerText = c.name;
                btn.onclick = () => checkAnswer(c.value);
                btnContainer.appendChild(btn);
            });
        }

        function checkAnswer(chosenValue) {
            if (chosenValue === currentTargetColor) {
                combo++;
                playBeep(660, 0.05);
            } else {
                combo = 0;
                playBeep(220, 0.2);
            }
            document.getElementById('combo-count').innerText = combo;
            setupGame();
        }

        // --- Math Challenge ---
        let mathAnswer = 0;
        function generateMath() {
            const a = Math.floor(Math.random() * 89) + 11;
            const b = Math.floor(Math.random() * 89) + 11;
            mathAnswer = a + b;
            document.getElementById('math-question').innerText = `${a} + ${b} = ?`;
            document.getElementById('math-input').value = '';
        }

        document.getElementById('math-submit').onclick = () => {
            const val = parseInt(document.getElementById('math-input').value);
            if (val === mathAnswer) {
                playBeep(880, 0.05);
                generateMath();
            } else {
                playBeep(110, 0.3);
            }
        };

        // --- Tips System ---
        const tips = [
            "冷たい水で15秒間手を洗うと、交感神経が活発になります。",
            "1分間だけ席を立ち、つま先立ちを繰り返すと血流が改善します。",
            "耳を上下左右に引っ張ると、頭の血行が良くなります。",
            "あえて深呼吸（4秒吸って8秒吐く）をすると、脳に酸素が行き渡ります。",
            "メンソールのリップや目薬を使うのは、物理的に有効な手段です。"
        ];
        setInterval(() => {
            document.getElementById('tip-text').innerText = tips[Math.floor(Math.random() * tips.length)];
        }, 10000);

        // Init
        window.onload = () => {
            setupGame();
            generateMath();
        };
    </script>
</body>
</html>
